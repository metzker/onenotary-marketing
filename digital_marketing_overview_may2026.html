document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 --white: #FFFFFF;\n  --danger: #C0392B;\n  --signature-gradient: linear-gradient(120deg, #055DFF 0%, #1B7E3E 60%, #FFC107 100%);\n\n  /* Typography scale (slides at 1920×1080) */\n  --type-display: 96px;\n  --type-title: 56px;\n  --type-subtitle: 36px;\n  --type-section: 28px;\n  --type-body: 22px;\n  --type-small: 18px;\n  --type-caption: 14px;\n  --type-stat-xl: 140px;\n  --type-stat: 96px;\n\n  /* Spacing */\n  --pad-x: 88px;\n  --pad-y: 72px;\n  --gap-title: 40px;\n  --gap-item: 24px;\n  --radius: 18px;\n  --radius-sm: 12px;\n  --radius-pill: 999px;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body { margin: 0; padding: 0; background: #000; font-family: 'Poppins', 'Verdana', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }\n\ndeck-stage > section {\n  background: var(--white);\n  color: var(--ink);\n  font-family: 'Poppins', 'Verdana', sans-serif;\n  overflow: hidden;\n  position: relative;\n}\n\n/* ============================================================\n   Slide chrome — wordmark + slide number\n   ============================================================ */\n.wordmark {\n  position: absolute;\n  left: 64px;\n  bottom: 44px;\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  z-index: 5;\n  font-family: 'Poppins', sans-serif;\n}\n.wordmark .mark {\n  width: 36px; height: 36px;\n  background: var(--brand-blue);\n  border-radius: 9px;\n  display: grid; place-items: center;\n  color: #fff;\n  font-weight: 700;\n  font-size: 16px;\n  letter-spacing: -0.02em;\n}\n.wordmark .name {\n  font-weight: 700;\n  font-size: 22px;\n  color: var(--brand-blue);\n  letter-spacing: -0.01em;\n}\n.wordmark.on-dark .name { color: #fff; }\n.wordmark.on-dark .mark { background: #fff; color: var(--brand-blue); }\n\n.slide-tag {\n  position: absolute;\n  right: 64px;\n  bottom: 44px;\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--muted);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  z-index: 5;\n}\n.slide-tag.on-dark { color: rgba(255,255,255,0.7); }\n\n/* ============================================================\n   Typography utilities\n   ============================================================ */\n.eyebrow {\n  font-size: 14px;\n  font-weight: 700;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--brand-blue);\n  margin: 0 0 16px;\n}\n.eyebrow.green { color: var(--pro-green); }\n.eyebrow.muted { color: var(--muted); }\n.eyebrow .dot {\n  display: inline-block;\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: currentColor;\n  margin-right: 10px;\n  vertical-align: middle;\n}\n\nh1.slide-title {\n  font-size: var(--type-title);\n  font-weight: 700;\n  line-height: 1.05;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  margin: 0 0 24px;\n  text-wrap: balance;\n}\nh2.slide-sub {\n  font-size: var(--type-subtitle);\n  font-weight: 500;\n  line-height: 1.2;\n  color: var(--muted);\n  margin: 0;\n}\np.body { font-size: var(--type-body); line-height: 1.45; color: var(--ink-2); margin: 0 0 16px; }\np.body.muted { color: var(--muted); }\n.caption { font-size: var(--type-caption); color: var(--muted); letter-spacing: 0.02em; }\n\n/* ============================================================\n   Pills, chips, badges\n   ============================================================ */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 6px 14px;\n  border-radius: var(--radius-pill);\n  font-size: 13px;\n  font-weight: 600;\n  letter-spacing: 0.04em;\n  border: 1px solid var(--border);\n}\n.pill.solid-blue { background: var(--brand-blue); color: #fff; border-color: transparent; }\n.pill.solid-green { background: var(--pro-green); color: #fff; border-color: transparent; }\n.pill.solid-deep { background: var(--deep-blue); color: #fff; border-color: transparent; }\n.pill.outline-blue { color: var(--brand-blue); border-color: var(--brand-blue); }\n.pill.outline-white { color: #fff; border-color: rgba(255,255,255,0.5); }\n.pill.tint { background: var(--surface); color: var(--brand-blue); border-color: transparent; }\n.pill.muted-grey { background: #eef0f4; color: var(--muted); border-color: transparent; }\n.pill.upper { text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px; padding: 5px 12px; }\n\n/* ============================================================\n   Cards\n   ============================================================ */\n.card {\n  background: #fff;\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  padding: 28px;\n  position: relative;\n}\n.card.tint { background: var(--surface); border-color: transparent; }\n.card.blue { background: var(--brand-blue); color: #fff; border-color: transparent; }\n.card.deep { background: var(--deep-blue); color: #fff; border-color: transparent; }\n.card.gradient { background: var(--signature-gradient); color: #fff; border-color: transparent; }\n.card.left-border-blue { border-left: 4px solid var(--brand-blue); }\n.card.left-border-green { border-left: 4px solid var(--pro-green); }\n\n/* ============================================================\n   Animation system — triggers on [data-deck-active]\n   Children with data-anim get staggered entries.\n   ============================================================ */\n[data-anim] {\n  opacity: 0;\n  will-change: transform, opacity;\n}\n\n/* ────────────────────────────────────────────────────────────\n   Text elements appear immediately — only structural visuals\n   (cards, tables, charts, diagrams, photos) animate in.\n   This keeps the deck feeling less \"busy\" on the eyes.\n   ──────────────────────────────────────────────────────────── */\nh1[data-anim],\nh2[data-anim],\nh3[data-anim],\np[data-anim],\n.eyebrow[data-anim],\n.summary[data-anim],\n.meta[data-anim],\n.note[data-anim],\n.sub[data-anim],\n.caption[data-anim],\n.ai-eyebrow[data-anim],\n.ai-delta[data-anim],\n.cover-headline > [data-anim],\n.cover-wordmark[data-anim],\n.cover-footer[data-anim],\n.b1-head > [data-anim],\n.b2-head > [data-anim],\n.res-head > [data-anim],\n.baseline-head > [data-anim],\n.plc-head > [data-anim],\n.pillars-head > [data-anim],\n.li-head > [data-anim],\n.pr-head > [data-anim],\n.pod-head > [data-anim],\n.reb-head > [data-anim],\n.map-head > [data-anim],\n.dec-head > [data-anim],\n.ctx-left > [data-anim],\n.geo-left > [data-anim]:not(.geo-target) {\n  opacity: 1 !important;\n  transform: none !important;\n  animation: none !important;\n}\n\n[data-deck-active] [data-anim=\"fade\"] { animation: fadeIn 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; animation-delay: var(--d, 0s); }\n[data-deck-active] [data-anim=\"up\"] { animation: fadeUp 0.85s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; animation-delay: var(--d, 0s); }\n[data-deck-active] [data-anim=\"right\"] { animation: fadeRight 0.85s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; animation-delay: var(--d, 0s); }\n[data-deck-active] [data-anim=\"left\"] { animation: fadeLeft 0.85s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; animation-delay: var(--d, 0s); }\n[data-deck-active] [data-anim=\"scale\"] { animation: scaleIn 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; animation-delay: var(--d, 0s); }\n[data-deck-active] [data-anim=\"grow-x\"] {\n  animation: growX 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;\n  animation-delay: var(--d, 0s);\n  transform-origin: left center;\n}\n[data-deck-active] [data-anim=\"count\"] { animation: fadeUp 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; animation-delay: var(--d, 0s); }\n\n@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(28px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n@keyframes fadeRight {\n  from { opacity: 0; transform: translateX(-28px); }\n  to { opacity: 1; transform: translateX(0); }\n}\n@keyframes fadeLeft {\n  from { opacity: 0; transform: translateX(28px); }\n  to { opacity: 1; transform: translateX(0); }\n}\n@keyframes scaleIn {\n  from { opacity: 0; transform: scale(0.92); }\n  to { opacity: 1; transform: scale(1); }\n}\n@keyframes growX {\n  from { opacity: 0; transform: scaleX(0); }\n  to { opacity: 1; transform: scaleX(1); }\n}\n\n/* Decorative slow loops */\n@keyframes pulse {\n  0%, 100% { transform: scale(1); opacity: 1; }\n  50% { transform: scale(1.06); opacity: 0.85; }\n}\n@keyframes drift {\n  0%, 100% { transform: translate(0, 0); }\n  50% { transform: translate(20px, -16px); }\n}\n@keyframes shimmer {\n  0% { background-position: -200% 0; }\n  100% { background-position: 200% 0; }\n}\n@keyframes spinSlow {\n  to { transform: rotate(360deg); }\n}\n\n/* ============================================================\n   Backgrounds — decorative elements\n   ============================================================ */\n.bg-grid {\n  position: absolute; inset: 0;\n  background-image:\n    linear-gradient(rgba(5,93,255,0.05) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(5,93,255,0.05) 1px, transparent 1px);\n  background-size: 80px 80px;\n  pointer-events: none;\n  mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);\n}\n.bg-orb {\n  position: absolute;\n  width: 600px; height: 600px;\n  border-radius: 50%;\n  filter: blur(80px);\n  opacity: 0.4;\n  pointer-events: none;\n}\n.bg-orb.blue { background: var(--brand-blue); }\n.bg-orb.green { background: var(--pro-green); }\n.bg-orb.yellow { background: var(--yellow); }\n\n/* ============================================================\n   Layout helpers\n   ============================================================ */\n.slide-inner {\n  position: absolute;\n  inset: var(--pad-y) var(--pad-x);\n  display: flex;\n  flex-direction: column;\n}\n.row { display: flex; }\n.col { display: flex; flex-direction: column; }\n.grow { flex: 1; }\n\n/* ============================================================\n   Tables\n   ============================================================ */\ntable.data-table {\n  width: 100%;\n  border-collapse: separate;\n  border-spacing: 0;\n  font-family: 'Poppins', sans-serif;\n  border-radius: var(--radius-sm);\n  overflow: hidden;\n  border: 1px solid var(--border);\n}\ntable.data-table thead th {\n  background: var(--brand-blue);\n  color: #fff;\n  font-weight: 600;\n  font-size: 16px;\n  text-align: left;\n  padding: 16px 20px;\n  letter-spacing: 0.02em;\n}\ntable.data-table tbody td {\n  padding: 14px 20px;\n  font-size: 18px;\n  color: var(--ink);\n  border-bottom: 1px solid var(--border);\n}\ntable.data-table tbody tr:last-child td { border-bottom: none; }\ntable.data-table tbody tr:nth-child(even) td { background: var(--surface); }\ntable.data-table .num { font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }\ntable.data-table .keyword { font-weight: 500; }\n\n/* Change pills */\n.change-up {\n  display: inline-flex; align-items: center; gap: 6px;\n  background: rgba(27,126,62,0.12); color: var(--pro-green);\n  padding: 5px 12px; border-radius: var(--radius-pill);\n  font-size: 14px; font-weight: 700;\n}\n.change-flat {\n  display: inline-flex; align-items: center; gap: 6px;\n  background: #eef0f4; color: var(--muted);\n  padding: 5px 12px; border-radius: var(--radius-pill);\n  font-size: 14px; font-weight: 600;\n}\n.rank-top { color: var(--brand-blue); font-weight: 700; }\n\n/* ============================================================\n   Number circle\n   ============================================================ */\n.num-circle {\n  width: 44px; height: 44px;\n  border-radius: 50%;\n  background: var(--brand-blue);\n  color: #fff;\n  font-weight: 700;\n  font-size: 20px;\n  display: inline-grid; place-items: center;\n  flex-shrink: 0;\n}\n.num-circle.outline {\n  background: transparent;\n  color: #fff;\n  border: 2px solid rgba(255,255,255,0.6);\n}\n.num-circle.large {\n  width: 64px; height: 64px;\n  font-size: 28px;\n}\n\n/* ============================================================\n   Animated arrows\n   ============================================================ */\n.arrow-right {\n  display: inline-flex;\n  align-items: center;\n  color: var(--brand-blue);\n}\n.arrow-right svg { display: block; }\n<\u002Fstyle>\n<style>\n  /* per-page overrides go here */\n  :fullscreen body, :fullscreen html { background: #000; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- ============================================================\nSLIDE 1 — Cover\n============================================================ -->\n<section data-label=\"01 Cover\" class=\"slide-cover\">\n  <style>\n    .slide-cover { background: var(--white); }\n    .cover-grid { position: absolute; inset: 0; display: grid; grid-template-columns: 38% 1fr; }\n    .cover-left {\n      background: var(--brand-blue);\n      position: relative;\n      padding: 88px 80px;\n      display: flex;\n      flex-direction: column;\n      justify-content: space-between;\n      overflow: hidden;\n    }\n    .cover-left::before {\n      content: ''; position: absolute;\n      width: 700px; height: 700px;\n      right: -260px; top: -140px;\n      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 60%);\n      border-radius: 50%;\n      animation: pulse 8s ease-in-out infinite;\n    }\n    .cover-left::after {\n      content: ''; position: absolute;\n      width: 380px; height: 380px;\n      left: -120px; bottom: -100px;\n      background: radial-gradient(circle, rgba(27,126,62,0.35) 0%, transparent 70%);\n      border-radius: 50%;\n      animation: drift 12s ease-in-out infinite;\n    }\n    .cover-wordmark {\n      display: flex; align-items: center; gap: 14px;\n      position: relative; z-index: 2;\n    }\n    .cover-wordmark .mark {\n      width: 56px; height: 56px;\n      background: #fff;\n      color: var(--brand-blue);\n      border-radius: 14px;\n      display: grid; place-items: center;\n      font-weight: 700; font-size: 22px;\n      letter-spacing: -0.04em
